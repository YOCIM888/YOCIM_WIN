<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0a0f" stroke="#00f0ff" stroke-width="2"/>
  <polygon points="50,15 85,35 85,65 50,85 15,65 15,35" fill="none" stroke="#00f0ff" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="50,30 70,42 70,58 50,70 30,58 30,42" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="50" y="55" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="20" font-weight="bold" filter="url(#glow)">Y</text>
</svg>
